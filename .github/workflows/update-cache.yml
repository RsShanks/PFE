name: Update GDELT Cache

# Quand déclencher ce script ?
on:
  schedule:
    - cron: '0 3 * * *' # Tous les jours à 3h00 du matin
  workflow_dispatch: # Permet de lancer le script manuellement avec un bouton

jobs:
  build-and-update:
    runs-on: ubuntu-latest # Un serveur GitHub gratuit avec 7 Go de RAM !

    steps:
    - name:  Cloner le code
      uses: actions/checkout@v3

    - name:  Installer Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name:  Installer les dépendances
      run: pip install -r requirements.txt

    - name: Lancer le script de traitement lourd (Radar)
      run: python scripts/update_cache.py

    - name: Lancer le script de crise (GDELT + YFinance)
      run: python scripts/update_cache_crise.py
    - name: Sauvegarder tous les JSON sur GitHub
      run: |
        git config --global user.name 'GeoPredict-Bot'
        git config --global user.email 'bot@geopredict.com'
        git add -f api/data/*.json
        git commit -m "🤖 Auto-update: Mise à jour du cache Radar et Crise" || echo "Aucune modification à commit"
        git push
